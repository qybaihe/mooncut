<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="MoonCut 社区：创作者主动分享的真实口播成片。">
    <title>MoonCut 社区</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/" aria-label="MoonCut 社区首页"><span>✦</span><strong>MoonCut</strong><small>社区</small></a>
      <div class="header-note">真实口播作品 · 无需登录即可浏览</div>
    </header>
    <main>
      <section class="hero">
        <p class="eyebrow">MOONCUT COMMUNITY</p>
        <h1>看看别人，<br>怎么把话说出来。</h1>
        <p>这里是创作者主动分享的真实口播成片。先找灵感，再开始自己的表达。</p>
      </section>
      <section aria-labelledby="works-title">
        <div class="section-heading">
          <div><p class="eyebrow">LATEST WORKS</p><h2 id="works-title">正在发生的创作</h2></div>
          <button id="refresh" type="button">刷新作品</button>
        </div>
        <p id="status" class="status" role="status">正在打开社区…</p>
        <div id="works" class="works" aria-live="polite"></div>
        <button id="load-more" class="load-more" type="button" hidden>查看更多作品</button>
      </section>
    </main>
    <dialog id="player">
      <button id="close-player" class="close" type="button" aria-label="关闭视频">×</button>
      <video id="video" controls playsinline preload="metadata"></video>
      <div class="player-copy"><p id="player-author"></p><h2 id="player-title"></h2><p id="player-caption"></p></div>
    </dialog>
    <script type="module" src="/app.js"></script>
  </body>
</html>
