# MoonCut Studio — continuous integration (packages + desktop unit tests)
# Does not build multi-GB full runtime; uses package tests + desktop node:test.

name: Studio CI

on:
  push:
    branches: [main]
    paths:
      - "mooncut-studio/**"
      - "mooncut-pi-agent/**"
      - ".github/workflows/studio-ci.yml"
      - ".github/workflows/studio-release.yml"
  pull_request:
    paths:
      - "mooncut-studio/**"
      - "mooncut-pi-agent/**"
      - ".github/workflows/studio-ci.yml"
      - ".github/workflows/studio-release.yml"
  workflow_dispatch:

concurrency:
  group: studio-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Build & test (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            mooncut-studio/package-lock.json
            mooncut-pi-agent/package-lock.json

      - name: Install Studio workspaces
        working-directory: mooncut-studio
        run: |
          # Prefer install over ci so platform-specific optional deps (rollup native) resolve on Linux.
          rm -rf node_modules
          npm install --no-audit --no-fund
          # Guard against npm optional-deps bug for rollup on linux runners
          if [[ "$(uname -s)" == "Linux" ]]; then
            npm install --no-save @rollup/rollup-linux-x64-gnu || true
          fi

      - name: Build pi-agent studio entry
        working-directory: mooncut-pi-agent
        run: |
          rm -rf node_modules
          npm install --no-audit --no-fund
          test -f src/capabilities.ts
          test -f src/cli.ts
          npm run build:studio
          test -f dist/cli.mjs

      - name: Build Studio packages
        working-directory: mooncut-studio
        run: |
          npm run build -w @mooncut/studio-shared
          npm run build -w @mooncut/studio-project-format
          npm run build -w @mooncut/studio-bootstrapper
          npm run build -w @mooncut/studio-agent-host

      - name: Test Studio packages
        working-directory: mooncut-studio
        run: |
          npm run test -w @mooncut/studio-shared
          npm run test -w @mooncut/studio-project-format
          npm run test -w @mooncut/studio-bootstrapper
          npm run test -w @mooncut/studio-agent-host

      - name: Desktop unit tests
        working-directory: mooncut-studio
        run: |
          # Packages already built; rebuild desktop then run node:test
          npm run build -w @mooncut/studio-desktop
          npm run test -w @mooncut/studio-desktop --if-present
          # explicit: avoid double full rebuild confusion
          (cd apps/desktop && node --test test/*.test.js)

      - name: Pi-agent studio gates
        working-directory: mooncut-pi-agent
        run: |
          node --experimental-strip-types --test \
            test/studio-data-root.test.ts \
            test/capabilities.test.ts \
            test/speech-cleanup.test.ts
