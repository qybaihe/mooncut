# MoonCut Studio — multi-platform desktop release
# Triggers: studio-v* tags or workflow_dispatch
# Artifacts: macOS arm64 dmg/zip, Windows x64 nsis, Linux x64 AppImage

name: Studio Release

on:
  push:
    tags:
      - "studio-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. studio-v0.1.0). Empty = studio-nightly-<run>"
        required: false
        default: ""
      runtime_profile:
        description: "minimal (CI) or full"
        required: false
        default: "minimal"

concurrency:
  group: studio-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  MOONCUT_RUNTIME_PROFILE: ${{ github.event.inputs.runtime_profile || 'minimal' }}
  CSC_IDENTITY_AUTO_DISCOVERY: "false"
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: mac
            artifact: mac-arm64
          - os: windows-latest
            platform: win
            artifact: win-x64
          - os: ubuntu-latest
            platform: linux
            artifact: linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            mooncut-studio/package-lock.json
            mooncut-pi-agent/package-lock.json

      - name: Install system deps (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm fakeroot

      - name: Install Studio workspaces
        working-directory: mooncut-studio
        shell: bash
        run: |
          set -euo pipefail
          rm -rf node_modules
          npm ci --include=optional --no-audit --no-fund

      - name: Install pi-agent + prebuild dist/cli.mjs
        working-directory: mooncut-pi-agent
        shell: bash
        run: |
          set -euo pipefail
          rm -rf node_modules
          npm ci --include=optional --no-audit --no-fund
          test -f src/capabilities.ts
          npm run build:studio
          test -f dist/cli.mjs

      - name: Prepare runtime (profile=${{ env.MOONCUT_RUNTIME_PROFILE }})
        working-directory: mooncut-studio
        shell: bash
        run: |
          set -euo pipefail
          export MOONCUT_RUNTIME_PROFILE="${MOONCUT_RUNTIME_PROFILE:-minimal}"
          npm run prepare:runtime
          test -f apps/desktop/resources/mooncut-runtime/mooncut-pi-agent/dist/cli.mjs

      - name: Build desktop app
        working-directory: mooncut-studio
        run: npm run build -w @mooncut/studio-desktop

      - name: Package with electron-builder
        working-directory: mooncut-studio/apps/desktop
        shell: bash
        run: |
          set -euo pipefail
          # Ensure electron-builder binary is available from workspace root install
          EB="../../node_modules/.bin/electron-builder"
          if [[ ! -x "$EB" ]]; then EB="npx electron-builder"; fi
          case "${{ matrix.platform }}" in
            mac)   $EB --mac --publish never -c.mac.identity=null ;;
            win)   $EB --win --publish never ;;
            linux) $EB --linux --publish never ;;
          esac

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          OUT="release-out/${{ matrix.artifact }}"
          mkdir -p "$OUT"
          REL="mooncut-studio/apps/desktop/release"
          if [[ ! -d "$REL" ]]; then
            echo "Missing release dir $REL" >&2
            find mooncut-studio/apps/desktop -maxdepth 3 -type d | head -40
            exit 1
          fi
          # Only ship real installers / update metadata — not random runtime bins
          # (ffmpeg.exe) or unrelated yml that may land under the release tree.
          find "$REL" -type f \( \
            -name 'MoonCut*.dmg' -o -name 'MoonCut*.zip' \
            -o -name 'MoonCut*.exe' -o -name 'MoonCut*.AppImage' \
            -o -name 'MoonCut*.deb' -o -name 'MoonCut*.rpm' \
            -o -name 'latest*.yml' -o -name 'builder-*.yml' \
            -o -name 'MoonCut*.blockmap' -o -name '*.blockmap' \
          \) -print -exec cp -v {} "$OUT/" \;
          echo "--- collected ---"
          ls -lah "$OUT"
          count=$(find "$OUT" -type f \( \
            -name '*.dmg' -o -name '*.zip' -o -name '*.exe' \
            -o -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' \
          \) | wc -l | tr -d ' ')
          if [[ "$count" -lt 1 ]]; then
            echo "No installable packages found" >&2
            find "$REL" -type f | head -80
            exit 1
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mooncut-studio-${{ matrix.artifact }}
          path: release-out/${{ matrix.artifact }}/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: mooncut-studio-*

      - name: Flatten assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-release
          find release-assets -type f -print0 | while IFS= read -r -d '' f; do
            cp -v "$f" "dist-release/$(basename "$f")"
          done
          (
            cd dist-release
            shasum -a 256 * > SHA256SUMS.txt
          )
          ls -lah dist-release
          test "$(find dist-release -type f | wc -l | tr -d ' ')" -ge 1

      - name: Resolve tag name
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=studio-v0.1.0-nightly.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: MoonCut Studio ${{ steps.tag.outputs.name }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.name, 'nightly') || contains(steps.tag.outputs.name, 'beta') }}
          generate_release_notes: true
          files: dist-release/*
          body: |
            ## MoonCut Studio desktop builds

            | Platform | Notes |
            |----------|--------|
            | macOS arm64 | `.dmg` / `.zip` (unsigned) |
            | Windows x64 | NSIS installer |
            | Linux x64 | AppImage |

            Runtime profile: **`${{ env.MOONCUT_RUNTIME_PROFILE }}`** (minimal = agent + ffmpeg).

            ### Install
            - **macOS unsigned:** right-click Open, or `xattr -cr "/Applications/MoonCut Studio.app"`
            - **Windows:** SmartScreen → More info → Run anyway
            - **Linux:** `chmod +x MoonCut*.AppImage && ./MoonCut*.AppImage`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
