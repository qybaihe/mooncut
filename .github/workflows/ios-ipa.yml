# 公开预览 IPA：可下载，但默认不连接内部服务 / 不嵌入密钥。
# - 使用 Public 配置（API Base = UNCONFIGURED）
# - 无 code signing 机密；产出 unsigned IPA，用户需自行重签安装
# - 切勿在此 workflow 注入 MOONCUT_API_KEY 或内网地址

name: iOS Public IPA

on:
  workflow_dispatch:
  push:
    tags:
      - "ios-v*"
    paths:
      - "ios/**"
      - ".github/workflows/ios-ipa.yml"
      - "docs/IOS_FEATURE_ANALYSIS.md"
  release:
    types: [published]

concurrency:
  group: ios-ipa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-unsigned-ipa:
    name: Build unsigned Public IPA
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer || \
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Resolve & build Public (unsigned)
        working-directory: ios
        run: |
          set -euo pipefail
          DERIVED="${RUNNER_TEMP}/MoonCut-Derived"
          mkdir -p "$DERIVED"
          # 不注入任何服务密钥；Public.xcconfig 将服务标为未配置
          xcodebuild \
            -project MoonCut.xcodeproj \
            -scheme MoonCut \
            -configuration Public \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            build

          APP="$(find "$DERIVED/Build/Products" -name 'MoonCut.app' -type d | head -n 1)"
          if [[ -z "$APP" ]]; then
            echo "MoonCut.app not found" >&2
            find "$DERIVED/Build/Products" -maxdepth 3 -type d || true
            exit 1
          fi
          echo "APP=$APP" >> "$GITHUB_ENV"
          echo "Found app: $APP"
          # 安全自检：禁止产物中出现 API Key 形态或内网调试痕迹
          if rg -n "MOONCUT_API_KEY|BEGIN PRIVATE KEY|sk-[A-Za-z0-9]{20,}" "$APP" 2>/dev/null; then
            echo "Security scan failed: secrets-like content in app bundle" >&2
            exit 1
          fi
          /usr/libexec/PlistBuddy -c 'Print :MoonCutAPIBaseURL' "$APP/Info.plist" || true
          /usr/libexec/PlistBuddy -c 'Print :MoonCutDistributionMode' "$APP/Info.plist" || true

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          chmod +x ios/scripts/package-unsigned-ipa.sh
          OUT_DIR="${RUNNER_TEMP}/ipa-out"
          mkdir -p "$OUT_DIR"
          IPA="$OUT_DIR/MoonCut-public-unsigned.ipa"
          ios/scripts/package-unsigned-ipa.sh "$APP" "$IPA"
          echo "IPA=$IPA" >> "$GITHUB_ENV"
          # 附带功能分析报告
          cp docs/IOS_FEATURE_ANALYSIS.md "$OUT_DIR/IOS_FEATURE_ANALYSIS.md"
          cat > "$OUT_DIR/README-DOWNLOAD.txt" <<'NOTE'
          MoonCut iOS — Public Preview IPA
          =================================
          中文：
          1. 本 IPA 为未签名公开预览包，不能开箱直连 MoonCut 内部服务端口。
          2. 包内服务地址为 UNCONFIGURED，无 API Key、无账号密码。
          3. 安装前请使用你自己的 Apple 开发者证书重签（例如 codesign / 第三方重签工具）。
          4. 完整能力需要你自建 mooncut-pi-agent，并用 Debug/受控 Release 配置后重新构建。
          5. 功能真实度见同目录 IOS_FEATURE_ANALYSIS.md。

          English:
          1. This is an unsigned public preview IPA. It does NOT talk to private MoonCut ports by default.
          2. Server base URL is UNCONFIGURED; no API keys or passwords are embedded.
          3. Re-sign with your own Apple certificate before installing on a device.
          4. Full cloud features require your own mooncut-pi-agent and a private build with explicit config.
          5. See IOS_FEATURE_ANALYSIS.md for real vs non-mock capabilities.
          NOTE

      - name: Upload IPA artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: MoonCut-public-unsigned-ipa
          path: |
            ${{ env.IPA }}
            ${{ runner.temp }}/ipa-out/IOS_FEATURE_ANALYSIS.md
            ${{ runner.temp }}/ipa-out/README-DOWNLOAD.txt
          if-no-files-found: error
          retention-days: 30


  attach-ipa:
    name: Attach verified IPA to GitHub Release
    needs: build-unsigned-ipa
    if: startsWith(github.ref, 'refs/tags/ios-v') || github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download verified IPA artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: MoonCut-public-unsigned-ipa
          path: release-assets

      - name: Attach IPA to GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
