name: web-deploy

on:
  push:
    branches: [main]
    paths:
      - "mooncut-web/**"
      - ".github/workflows/web-deploy.yml"
  pull_request:
    paths:
      - "mooncut-web/**"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    defaults:
      run:
        working-directory: mooncut-web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          # Node 24 runs the repository's native TypeScript node:test files;
          # Node 20 treats their .ts extension as unsupported.
          node-version: "24"
          cache: "npm"
          cache-dependency-path: mooncut-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check & build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Deploy to Cloudflare Pages (preview on PR, production on main)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: mooncut-web
          command: pages deploy dist --project-name mooncut-web --branch ${{ github.head_ref || github.ref_name }}
