name: Bug report
description: Report a reproducible defect in MoonCut.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not include API keys, private videos, personal data, or security vulnerabilities. See SECURITY.md for sensitive reports."
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: State the expected and actual behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include commands, platform, version/commit, and safe logs.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime versions, browser/device, and deployment mode.
