openapi: 3.1.0
info:
  title: MoonCut Pi Video Editor API
  version: 1.1.0
  description: 上传口播视频，异步完成转录、按需示例图调度、证据抓取、人脸跟踪、语义分镜、Remotion 渲染和视觉质检。
servers:
  - url: https://42.194.219.172
    description: Production (use the bundled mooncut-ca.crt)
security:
  - bearerAuth: []
  - sessionCookie: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-api-key
    sessionCookie:
      type: apiKey
      in: cookie
      name: mooncut_session
  schemas:
    AuthUser:
      type: object
      required: [id, email, createdAt]
      properties:
        id: {type: string, pattern: "^[a-f0-9]{32}$"}
        email: {type: string, format: email}
        createdAt: {type: string, format: date-time}
    CreateEditResponse:
      type: object
      required: [id, status, assetId, statusUrl, videoUrl]
      properties:
        id: {type: string}
        status: {type: string, enum: [queued]}
        assetId: {type: string}
        statusUrl: {type: string, format: uri}
        videoUrl: {type: string, format: uri}
    Job:
      type: object
      required: [id, status, stage, progress, createdAt, updatedAt]
      properties:
        id: {type: string}
        status: {type: string, enum: [queued, running, completed, failed]}
        stage: {type: string}
        progress: {type: number, minimum: 0, maximum: 1}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
        originalName: {type: string}
        error: {type: string}
        subtitleRepair:
          type: object
          description: Present on a non-destructive human subtitle-repair version.
          properties:
            parentJobId: {type: string}
            rootJobId: {type: string}
            feedback: {$ref: "#/components/schemas/SubtitleRepairFeedback"}
            analysis:
              type: object
              properties:
                summary: {type: string}
                model: {type: string}
                changes:
                  type: array
                  items:
                    type: object
                    properties:
                      segmentIndex: {type: integer}
                      before: {type: string}
                      after: {type: string}
                      startMs: {type: integer}
                      endMs: {type: integer}
                      reason: {type: string}
        result:
          type: object
          properties:
            summary: {type: string}
            artifacts:
              type: object
              additionalProperties: {type: string, format: uri}
            visuals:
              type: object
              properties:
                mode: {type: string, enum: [off, none, generated, unavailable]}
                reason: {type: string}
                maxImages: {type: integer, maximum: 2}
                requestedCount: {type: integer, maximum: 2}
    SubtitleRepairFeedback:
      type: object
      additionalProperties: false
      required: [instruction]
      properties:
        instruction: {type: string, minLength: 2, maxLength: 2000}
        atMs: {type: integer, minimum: 0, description: Optional preview cue point in source-timeline milliseconds.}
        replacementText: {type: string, minLength: 1, maxLength: 160}
    CommunityPost:
      type: object
      required: [id, authorName, title, caption, durationMs, width, height, createdAt, videoUrl]
      properties:
        id: {type: string, pattern: "^[a-f0-9]{32}$"}
        authorName: {type: string, maxLength: 32}
        title: {type: string, maxLength: 80}
        caption: {type: string, maxLength: 280}
        durationMs: {type: integer, minimum: 0}
        width: {type: integer, minimum: 1}
        height: {type: integer, minimum: 1}
        createdAt: {type: string, format: date-time}
        videoUrl: {type: string, format: uri}
        posterUrl: {type: string, format: uri}
    CapabilityPermission:
      type: object
      required: [name, reason]
      properties:
        name: {type: string, enum: [network, artifact.write]}
        reason: {type: string}
        domains: {type: array, items: {type: string}}
        kinds: {type: array, items: {type: string}}
    CapabilityCatalogItem:
      type: object
      required: [id, slug, name, tagline, category, trustLevel, status, currentRelease, tools]
      properties:
        id: {type: string}
        slug: {type: string}
        name: {type: string}
        tagline: {type: string}
        category: {type: string}
        trustLevel: {type: string, enum: [official, verified]}
        status: {type: string, enum: [published, yanked]}
        currentRelease:
          type: object
          required: [id, version, manifestHash, permissions, tasks, updatedAt]
          properties:
            id: {type: string}
            version: {type: string}
            manifestHash: {type: string}
            permissions: {type: array, items: {$ref: "#/components/schemas/CapabilityPermission"}}
            tasks: {type: array, items: {type: string, enum: [research, video-edit]}}
            updatedAt: {type: string, format: date-time}
        tools:
          type: array
          items:
            type: object
            required: [name, description, confirmation]
            properties:
              name: {type: string}
              description: {type: string}
              confirmation: {type: string, enum: [never, when_artifact_is_created]}
    CapabilityInstallation:
      type: object
      required: [id, packageId, releaseId, slug, version, manifestHash, status, permissions, tasks]
      properties:
        id: {type: string, pattern: "^[a-f0-9]{32}$"}
        packageId: {type: string}
        releaseId: {type: string}
        slug: {type: string}
        version: {type: string}
        manifestHash: {type: string}
        status: {type: string, enum: [enabled, disabled, needs_reconsent, uninstalled]}
        permissions: {type: array, items: {$ref: "#/components/schemas/CapabilityPermission"}}
        tasks: {type: array, items: {type: string, enum: [research, video-edit]}}
    CapabilityInvocation:
      type: object
      required: [id, installationId, toolName, status, startedAt, finishedAt, release, output, artifacts]
      properties:
        id: {type: string, pattern: "^[a-f0-9]{32}$"}
        installationId: {type: string}
        toolName: {type: string}
        status: {type: string, enum: [succeeded, failed]}
        startedAt: {type: string, format: date-time}
        finishedAt: {type: string, format: date-time}
        output: {type: object, additionalProperties: true}
        artifacts:
          type: array
          items:
            type: object
            properties:
              id: {type: string}
              kind: {type: string, enum: [web-screenshot, research-json]}
              sourceUrl: {type: string, format: uri}
              url: {type: string, format: uri}
    RenderQueueItem:
      type: object
      required: [name, status, stage, progress, createdAt, updatedAt, mine]
      properties:
        name: {type: string, description: Privacy-safe generated display name; never a filename or job hash.}
        status: {type: string, enum: [queued, running, completed, failed]}
        stage: {type: string}
        progress: {type: number, minimum: 0, maximum: 1}
        queuePosition: {type: integer, minimum: 1}
        createdAt: {type: string, format: date-time}
        updatedAt: {type: string, format: date-time}
        mine: {type: boolean}
paths:
  /healthz:
    get:
      security: []
      summary: 服务与模型网关健康检查
      responses:
        "200": {description: Healthy}
  /docs:
    get:
      security: []
      summary: 人类可读的快速接入文档
      responses:
        "200": {description: HTML documentation}
  /openapi.yaml:
    get:
      security: []
      summary: OpenAPI 3.1 契约
      responses:
        "200": {description: OpenAPI YAML}
  /v1/auth/register:
    post:
      security: []
      summary: 使用邮箱和密码注册；无需邮箱验证并立即建立登录会话
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: {type: string, format: email, maxLength: 254}
                password: {type: string, format: password, minLength: 8, maxLength: 128}
      responses:
        "201": {description: Registered and signed in; sets HttpOnly session cookie}
        "409": {description: Email already registered}
        "429": {description: Too many attempts}
  /v1/auth/login:
    post:
      security: []
      summary: 使用邮箱和密码登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: {type: string, format: email}
                password: {type: string, format: password}
      responses:
        "200": {description: Signed in; sets HttpOnly session cookie}
        "401": {description: Email or password is incorrect}
        "429": {description: Too many attempts}
  /v1/auth/logout:
    post:
      security: []
      summary: 注销当前会话并清除 Cookie
      responses:
        "200": {description: Signed out}
  /v1/auth/me:
    get:
      security:
        - sessionCookie: []
      summary: 获取当前登录用户
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: {$ref: "#/components/schemas/AuthUser"}
        "401": {description: Not signed in}
  /v1/auth/session:
    get:
      security: []
      summary: 静默恢复 Web 会话；未登录时返回 null
      responses:
        "200": {description: Current user or null}
  /v1/edits:
    post:
      summary: 一次上传视频并创建异步剪辑任务
      parameters:
        - in: query
          name: filename
          required: true
          schema: {type: string, example: talking-head.mp4}
        - in: query
          name: prompt
          schema: {type: string}
        - in: query
          name: title
          schema: {type: string}
        - in: query
          name: notificationEmail
          schema: {type: string, format: email}
        - in: query
          name: imageGeneration
          description: 默认 auto，由保守调度器决定 0–2 张；off 完全关闭。
          schema: {type: string, enum: [auto, off], default: auto}
      requestBody:
        required: true
        content:
          video/mp4: {}
          video/quicktime: {}
          application/octet-stream: {}
      responses:
        "202":
          description: Queued
          content:
            application/json:
              schema: {$ref: "#/components/schemas/CreateEditResponse"}
        "401": {description: Invalid API key}
        "413": {description: Upload too large}
        "429": {description: Queue full or rate limited}
  /v1/render-queue:
    get:
      summary: 查看匿名化的当前运行、排队和最近完成任务
      responses:
        "200":
          description: Live render queue snapshot
          content:
            application/json:
              schema:
                type: object
                required: [updatedAt, summary, active, recent]
                properties:
                  updatedAt: {type: string, format: date-time}
                  summary:
                    type: object
                    required: [running, queued, completedToday]
                    properties:
                      running: {type: integer, minimum: 0}
                      queued: {type: integer, minimum: 0}
                      completedToday: {type: integer, minimum: 0}
                  active: {type: array, items: {$ref: "#/components/schemas/RenderQueueItem"}}
                  recent: {type: array, items: {$ref: "#/components/schemas/RenderQueueItem"}}
  /v1/assets:
    post:
      summary: 仅上传视频；用于两阶段接入
      parameters:
        - in: query
          name: filename
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          video/mp4: {}
          application/octet-stream: {}
      responses:
        "201": {description: Uploaded asset}
  /v1/edit-jobs:
    post:
      summary: 使用已上传 assetId 创建任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assetId]
              properties:
                assetId: {type: string}
                title: {type: string}
                prompt: {type: string}
                notificationEmail: {type: string, format: email}
                imageGeneration: {type: string, enum: [auto, off], default: auto}
      responses:
        "202": {description: Queued job}
  /v1/edit-jobs/{jobId}:
    get:
      summary: 查询任务状态、进度和产物 URL
      parameters:
        - in: path
          name: jobId
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Job record
          content:
            application/json:
              schema: {$ref: "#/components/schemas/Job"}
  /v1/edit-jobs/{jobId}/subtitle-repairs:
    get:
      summary: 获取同一成片的全部人工字幕修订版本
      parameters:
        - in: path
          name: jobId
          required: true
          schema: {type: string, pattern: "^[a-f0-9]{32}$"}
      responses:
        "200":
          description: Root version and all derived subtitle repair jobs
          content:
            application/json:
              schema:
                type: object
                required: [rootJobId, items]
                properties:
                  rootJobId: {type: string}
                  items:
                    type: array
                    items: {$ref: "#/components/schemas/Job"}
    post:
      summary: 从已完成成片创建一个非破坏性的字幕修订任务
      parameters:
        - in: path
          name: jobId
          required: true
          schema: {type: string, pattern: "^[a-f0-9]{32}$"}
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: "#/components/schemas/SubtitleRepairFeedback"}
      responses:
        "202": {description: Subtitle repair queued}
        "409": {description: The selected version is not completed}
  /v1/edit-jobs/{jobId}/artifacts/{artifactName}:
    get:
      summary: 下载成片或任务产物
      parameters:
        - in: path
          name: jobId
          required: true
          schema: {type: string}
        - in: path
          name: artifactName
          required: true
          schema:
            type: string
            description: 包括固定产物名，以及 imageGeneration、generated-{id}、generated-meta-{id} 等按任务生成的名称。
      responses:
        "200": {description: Artifact bytes}
        "404": {description: Artifact not found}
  /v1/models:
    get:
      summary: 查看当前模型路由
      responses:
        "200": {description: Model list}
  /v1/mail/status:
    get:
      summary: 检查邮件发送能力
      responses:
        "200": {description: Mail account status}
  /v1/capabilities:
    get:
      security: []
      summary: 浏览已审核的 Pi 能力目录；有 Cookie 时会附带自己的安装状态
      parameters:
        - in: query
          name: query
          schema: {type: string, maxLength: 120}
      responses:
        "200":
          description: Capability catalog
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items: {type: array, items: {$ref: "#/components/schemas/CapabilityCatalogItem"}}
  /v1/capabilities/{slug}:
    get:
      security: []
      summary: 查看单个能力的当前可信 release
      parameters:
        - in: path
          name: slug
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Capability details
          content:
            application/json:
              schema: {$ref: "#/components/schemas/CapabilityCatalogItem"}
        "404": {description: Capability unavailable}
  /v1/capabilities/{slug}/install:
    post:
      summary: 为当前登录用户安装当前 release
      parameters:
        - in: path
          name: slug
          required: true
          schema: {type: string}
      responses:
        "201": {description: Installed}
        "200": {description: Already installed or restored}
  /v1/me/capability-installations:
    get:
      summary: 列出当前用户的能力安装状态
      responses:
        "200":
          description: Installations
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items: {type: array, items: {$ref: "#/components/schemas/CapabilityInstallation"}}
  /v1/me/capability-installations/{installationId}:
    patch:
      summary: 启用或暂停当前用户的一项能力
      parameters:
        - in: path
          name: installationId
          required: true
          schema: {type: string, pattern: "^[a-f0-9]{32}$"}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: {type: string, enum: [enabled, disabled]}
      responses:
        "200": {description: Updated}
        "409": {description: Reconsent required}
    delete:
      summary: 卸载当前用户的一项能力（不删除历史审计）
      parameters:
        - in: path
          name: installationId
          required: true
          schema: {type: string, pattern: "^[a-f0-9]{32}$"}
      responses:
        "200": {description: Uninstalled}
  /v1/me/capability-installations/{installationId}/preflight:
    post:
      summary: 无副作用检查已部署的受控适配器及其上游访问链路
      parameters:
        - in: path
          name: installationId
          required: true
          schema: {type: string, pattern: "^[a-f0-9]{32}$"}
      responses:
        "200": {description: Preflight result}
  /v1/me/capability-installations/{installationId}/reconfirm:
    post:
      summary: 显式确认更新后的权限，并重新启用该 installation
      parameters:
        - in: path
          name: installationId
          required: true
          schema: {type: string, pattern: "^[a-f0-9]{32}$"}
      responses:
        "200": {description: Permission grant renewed}
  /v1/me/capability-installations/{installationId}/invoke:
    post:
      summary: 用户明确发起受控能力调用；写入 artifact 的调用必须携带确认
      parameters:
        - in: path
          name: installationId
          required: true
          schema: {type: string, pattern: "^[a-f0-9]{32}$"}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [tool, input]
                  properties:
                    tool: {const: fifa_find_highlights}
                    input:
                      type: object
                      required: [query]
                      properties:
                        query: {type: string, minLength: 2, maxLength: 120}
                - type: object
                  required: [tool, input]
                  properties:
                    tool: {const: fifa_match_context}
                    confirmedArtifact: {type: boolean}
                    input:
                      type: object
                      required: [matchId]
                      properties:
                        matchId: {type: string}
                        includeChineseContext: {type: boolean}
                        screenshotView: {type: string, enum: [ratings, match, chat]}
      responses:
        "200":
          description: Invocation record
          content:
            application/json:
              schema: {$ref: "#/components/schemas/CapabilityInvocation"}
        "409": {description: Capability disabled or artifact confirmation missing}
  /v1/capability-invocations:
    get:
      summary: 查询当前用户自己的能力调用审计
      parameters:
        - in: query
          name: installationId
          schema: {type: string, pattern: "^[a-f0-9]{32}$"}
      responses:
        "200": {description: Invocation page}
  /v1/capability-invocations/{invocationId}/artifacts/{artifactId}:
    get:
      summary: 下载当前用户能力调用产生的私有 artifact
      parameters:
        - in: path
          name: invocationId
          required: true
          schema: {type: string, pattern: "^[a-f0-9]{32}$"}
        - in: path
          name: artifactId
          required: true
          schema: {type: string, pattern: "^[a-f0-9]{32}$"}
      responses:
        "200": {description: Artifact bytes}
        "404": {description: Invocation or artifact unavailable}
  /v1/admin/capability-packages:
    post:
      summary: 服务端创建一个能力 package（仅 Bearer service key）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug: {type: string, pattern: "^[a-z0-9][a-z0-9-]{2,79}$"}
                trustLevel: {type: string, enum: [official, verified]}
      responses:
        "201": {description: Package created}
  /v1/admin/capability-packages/{packageId}/releases:
    post:
      summary: 发布不可变的签名 manifest release（仅 Bearer service key）
      parameters:
        - in: path
          name: packageId
          required: true
          schema: {type: string, minLength: 3, maxLength: 120}
      responses:
        "201": {description: Release published}
        "409": {description: Version already exists}
  /v1/admin/capability-releases/{releaseId}/yank:
    post:
      summary: 撤销一个 release，阻止后续安装（仅 Bearer service key）
      parameters:
        - in: path
          name: releaseId
          required: true
          schema: {type: string, pattern: "^[a-f0-9]{32}$"}
      responses:
        "200": {description: Release yanked}
  /v1/community/posts:
    get:
      summary: 浏览用户主动发布的社区口播成片
      parameters:
        - in: query
          name: limit
          schema: {type: integer, minimum: 1, maximum: 24, default: 12}
        - in: query
          name: cursor
          schema: {type: string}
      responses:
        "200":
          description: Community page
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items: {type: array, items: {$ref: "#/components/schemas/CommunityPost"}}
                  nextCursor: {type: string}
    post:
      summary: 把一条质检通过的完成任务主动分享到社区
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [jobId]
              properties:
                jobId: {type: string, pattern: "^[a-f0-9]{32}$"}
                authorName: {type: string, maxLength: 32}
                title: {type: string, maxLength: 80}
                caption: {type: string, maxLength: 280}
      responses:
        "201": {description: Published}
        "200": {description: Already published; existing post returned}
        "409": {description: Job incomplete, unavailable, or failed quality review}
  /v1/community/posts/{postId}:
    get:
      summary: 查看单条社区作品
      parameters:
        - in: path
          name: postId
          required: true
          schema: {type: string, pattern: "^[a-f0-9]{32}$"}
      responses:
        "200":
          description: Community post
          content:
            application/json:
              schema: {$ref: "#/components/schemas/CommunityPost"}
        "404": {description: Post not found}
  /v1/community/posts/{postId}/video:
    get:
      summary: 流式播放社区成片，支持 HTTP Range
      parameters:
        - in: path
          name: postId
          required: true
          schema: {type: string, pattern: "^[a-f0-9]{32}$"}
      responses:
        "200": {description: Full MP4}
        "206": {description: Partial MP4 range}
        "404": {description: Video unavailable}
  /v1/community/posts/{postId}/poster:
    get:
      summary: 获取社区成片预览图
      parameters:
        - in: path
          name: postId
          required: true
          schema: {type: string, pattern: "^[a-f0-9]{32}$"}
      responses:
        "200": {description: Poster image}
        "404": {description: Poster unavailable}
  /v1/edit-jobs/{jobId}/mail/prepare:
    post:
      summary: 准备成片邮件，返回待确认内容
      parameters:
        - in: path
          name: jobId
          required: true
          schema: {type: string}
      responses:
        "200": {description: Pending confirmation}
  /v1/edit-jobs/{jobId}/mail/{pendingId}/confirm:
    post:
      summary: 确认发送上一接口准备的邮件
      parameters:
        - in: path
          name: jobId
          required: true
          schema: {type: string}
        - in: path
          name: pendingId
          required: true
          schema: {type: string}
      responses:
        "200": {description: Email sent}
