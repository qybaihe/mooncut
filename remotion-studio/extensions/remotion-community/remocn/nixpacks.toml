# Nixpacks build config for Coolify (default build pack — used unless you switch
# the resource to the Dockerfile build pack).
#
# Nixpacks does NOT install Chromium's system libraries by default, so
# @remotion/renderer can't launch headless Chrome. The aptPkgs below add exactly
# the runtime libs + fonts Remotion needs.
#
# IMPORTANT: the libs alone aren't enough. The Coolify BUILD command must also
# bake in the browser + the Remotion bundle, e.g.:
#
#   bun install && bun run build && bun run remotion:browser && bun run bundle:remotion
#
# (`remotion:browser` downloads the Chrome Headless Shell via @remotion/renderer's
# ensureBrowser() — NOT `bunx remotion ...`, the `remotion` pkg has no CLI binary;
# `bundle:remotion` pre-builds .remotion-bundle/ so the serveUrl is ready at boot.)
# Start command (Coolify UI): bun run start
#
# NOTE: the Nixpacks base image is Ubuntu Noble (24.04), where the time_t (t64)
# transition RENAMED several libs — libasound2 → libasound2t64, libatk1.0-0 →
# libatk1.0-0t64, libatk-bridge2.0-0 → libatk-bridge2.0-0t64, libcups2 →
# libcups2t64, libgtk-3-0 → libgtk-3-0t64. The t64 names below are required on
# Noble. (The Dockerfile build pack uses Debian Bookworm, where the OLD names
# apply — that's why the two lists differ.)

[phases.setup]
aptPkgs = [
  "ca-certificates","fonts-liberation","libasound2t64","libatk-bridge2.0-0t64",
  "libatk1.0-0t64","libcups2t64","libdbus-1-3","libdrm2","libgbm1","libgtk-3-0t64",
  "libnss3","libpango-1.0-0","libxcomposite1","libxdamage1","libxfixes3",
  "libxkbcommon0","libxrandr2"
]
