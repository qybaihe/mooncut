# Opens (or keeps refreshed) a single Release PR whenever new commits land
# on main. The PR bumps the version in packages/cli/package.json, regenerates
# CHANGELOG.md from Conventional Commits since the last tag, and updates
# .release-please-manifest.json. Merging that PR creates a GitHub Release +
# git tag `ondajs-vX.Y.Z` — which fires `publish.yml`.
#
# IMPORTANT — why we explicitly dispatch `publish.yml` below: events created
# by the default GITHUB_TOKEN (like `release: published`) do NOT trigger
# downstream workflows. This is GitHub's anti-loop safeguard. The carve-out
# is `workflow_dispatch` / `repository_dispatch` — those DO trigger from
# GITHUB_TOKEN. So we use `gh workflow run` to explicitly kick publish
# whenever release-please actually creates a release (`releases_created`
# output is `true` only on the merge of the release PR, not on every push).

name: release-please

on:
  push:
    branches: [main]

# release-please needs to write to the repo (open PRs, update files, push
# tags). `actions: write` is added so the final step can dispatch publish.yml.
permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # Only fires on the run that actually created a release for packages/cli.
      # release-please runs in monorepo / component mode (per
      # release-please-config.json), so per-package outputs are exposed as
      # `<path>--<output>` — `tag_name` at the top level is empty in this mode.
      # `--repo` is required because this job doesn't `actions/checkout`, so
      # `gh` would otherwise try to infer the repo from a non-existent .git.
      - name: Trigger publish workflow on new release
        if: ${{ steps.release.outputs['packages/cli--release_created'] == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.release.outputs['packages/cli--tag_name'] }}"
          echo "release-please created $tag — dispatching publish.yml"
          gh workflow run publish.yml \
            --repo ${{ github.repository }} \
            --ref main \
            --field tag="$tag"
